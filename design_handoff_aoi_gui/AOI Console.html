  AOI Console — GUI 重新設計（互動原型）
  ─────────────────────────────────────
  依據：AOI_CVbased PySide6 GUI（main_window / recipe_panel / recipe_designer_panel /
        detector_param_panel / result_panel）

  設計重點：
  · 左側窄圖示導覽（檢測執行 / Recipe 設計 / 檢測結果）取代分頁，畫面層級更清楚
  · 頂部精簡：影像與 Recipe 變成「狀態 chip」，點擊載入；「開始檢測」移入右側控制面板成為唯一主按鈕
  · 輸出目錄等不常用設定收進右側「設定」抽屜
  · 操作員 OP / 工程師模式切換：OP 只看大狀態與開始按鈕，工程師看完整參數
  · 檢測結果獨立頁：摘要卡 + 缺陷表 + NG tile 縮圖，可點擊回到影像定位缺陷
-->
