name: RTX runner heartbeat

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  verify-recent-success:
    runs-on: ubuntu-latest
    steps:
      - name: Require RTX success within 48 hours
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rtx3090-validation.yml',
              status: 'success',
              per_page: 1,
            });
            if (response.data.workflow_runs.length === 0) {
              core.setFailed('RTX validation has no successful run.');
              return;
            }
            const last = response.data.workflow_runs[0];
            const ageHours = (Date.now() - Date.parse(last.updated_at)) / 3_600_000;
            core.info(`Last RTX success: ${last.html_url} (${ageHours.toFixed(1)} hours ago)`);
            if (ageHours > 48) core.setFailed(`RTX validation is stale: ${ageHours.toFixed(1)} hours.`);
