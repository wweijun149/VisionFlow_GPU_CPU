name: Weekly Windows packaging

on:
  schedule:
    - cron: "30 20 * * 0"
  workflow_dispatch:

jobs:
  package-smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock.txt
      - name: Create locked build environment
        shell: pwsh
        run: |
          python -m venv env
          .\env\Scripts\python.exe -m pip install -r requirements.lock.txt
      - name: Build PyInstaller package
        shell: pwsh
        run: .\build_exe.ps1
      - name: Packaged smoke
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          & '.\dist\VisionFlow AOI\VisionFlow AOI.exe' --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Packaged smoke failed with exit code $LASTEXITCODE" }
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: weekly-visionflow-aoi-${{ github.sha }}
          path: dist/VisionFlow AOI/
          if-no-files-found: error
