recipe_name: "PRODUCT_A_NEGATIVE_401_AOI_01"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

gpu:
  tiling: false
  display: false
  dll_path: "gpu/visionflow_cuda.dll"
  fallback_to_cpu: true

tile:
  mode: "grid"
  width: 512
  height: 512
  overlap_x: 64
  overlap_y: 64

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "401"
  max_ng_count: 0

detectors:
  "401":
    enabled: true
    use_gpu: false
    display_name: "401_ negative"
    params:
      roi_inset_px: 100
      blur_size: 15
      morph_operation: "open"
      morph_kernel: 5
      morph_iterations: 10
      adaptive_block_size: 29
      adaptive_c: 5
      binary_inv: true
      max_value: 255
      contour_mode: "list"
      min_area: 25
      max_area: 10000

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_matrix_csv: true
  save_json: true
