recipe_name: "PRODUCT_A_WHITE_RATIO_401_2_AOI_01"
product_id: "PRODUCT_A"
machine_id: "AOI_01"
version: "0.1.0"

gpu:
  tiling: false
  display: false
  dll_path: "gpu/visionflow_cuda.dll"
  fallback_to_cpu: true

tile:
  mode: "grid"
  width: 512
  height: 512
  overlap_x: 64
  overlap_y: 64

decision:
  mode: "all_detectors_must_pass"
  important_detectors:
    - "401-2"
  max_ng_count: 0

detectors:
  "401-2":
    enabled: true
    use_gpu: false
    display_name: "401-2 adaptive white ratio detector"
    params:
      max_value: 255
      blur_size: 25
      adaptive_block_size: 35
      adaptive_c: -2.0
      roi_inset_px: 0
      contour_mode: "list"
      min_area: 0
      max_area: 0
      white_pixel_ratio_threshold: 0.625

output:
  save_overlay: true
  save_ng_tiles: true
  save_csv: true
  save_matrix_csv: true
  save_json: true
